<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF6B35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>家庭积分星球</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-light: #FF8E53;
            --bg: #f5f5f5;
            --card: white;
            --text: #333;
            --text-light: #888;
            --success: #4CAF50;
            --danger: #f44336;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px rgba(255,107,53,0.3);
        }
        .header h1 { font-size: 22px; margin-bottom: 4px; }
        .header .user { font-size: 14px; opacity: 0.9; }
        .points-display {
            background: white;
            margin: 16px;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .points-display .label { color: var(--text-light); font-size: 14px; margin-bottom: 8px; }
        .points-display .value { font-size: 56px; color: var(--primary); font-weight: bold; line-height: 1; }
        .points-display .unit { font-size: 20px; color: var(--primary-light); margin-left: 4px; }
        .tabs {
            display: flex;
            background: white;
            padding: 0;
            position: sticky;
            top: 76px;
            z-index: 99;
            border-bottom: 1px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-light);
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab:hover { background: #fafafa; }
        .content { padding: 16px; padding-bottom: 80px; }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .card-title { font-weight: 600; font-size: 16px; }
        .card-badge {
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        .card-meta { font-size: 13px; color: var(--text-light); margin-bottom: 8px; }
        .task-points {
            display: inline-block;
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,107,53,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-sm { padding: 8px 16px; font-size: 13px; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .rank-list { padding: 8px 0; }
        .rank-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .rank-item:last-child { border-bottom: none; }
        .rank-num {
            width: 28px;
            height: 28px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            margin-right: 12px;
        }
        .rank-num.top { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; }
        .rank-name { flex: 1; font-weight: 500; }
        .rank-points { color: var(--primary); font-weight: 600; font-size: 16px; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text-light);
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-actions .btn { flex: 1; text-align: center; }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1001;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            font-size: 28px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,107,53,0.4);
            z-index: 50;
        }
        .fab:hover { transform: scale(1.1); }
        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-card h2 { text-align: center; color: var(--primary); margin-bottom: 8px; font-size: 24px; }
        .login-card p { text-align: center; color: var(--text-light); margin-bottom: 30px; font-size: 14px; }
        .login-card input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .login-card input:focus { outline: none; border-color: var(--primary); }
        .login-card .btn { width: 100%; padding: 14px; font-size: 16px; margin-top: 8px; }
        .login-tabs { display: flex; margin-bottom: 24px; }
        .login-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-bottom: 2px solid #eee; color: var(--text-light); }
        .login-tab.active { border-bottom-color: var(--primary); color: var(--primary); font-weight: 600; }
        .section-title { font-size: 16px; font-weight: 600; margin: 20px 0 12px; color: var(--text-light); }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="loginPage" class="login-page" style="display: none;">
        <div class="login-card">
            <h2>🎃 积分星球</h2>
            <p>让孩子在快乐中成长</p>
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchLoginTab('login')">登录</div>
                <div class="login-tab" onclick="switchLoginTab('register')">注册</div>
            </div>
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="邮箱">
                <input type="password" id="loginPassword" placeholder="密码">
                <button class="btn" onclick="handleLogin()">登录</button>
            </div>
            <div id="registerForm" style="display: none;">
                <input type="text" id="regUsername" placeholder="你的名字">
                <input type="email" id="regEmail" placeholder="邮箱">
                <input type="password" id="regPassword" placeholder="密码（至少6位）">
                <input type="text" id="regFamily" placeholder="家庭名称（可选）">
                <button class="btn" onclick="handleRegister()">创建家庭</button>
            </div>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="appPage" style="display: none;">
        <div class="header">
            <h1>🎃 家庭积分星球</h1>
            <div class="user" id="userInfo">加载中...</div>
            <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);margin-top:8px" onclick="logout()">退出登录</button>
        </div>

        <div class="points-display" id="pointsDisplay">
            <div class="label" id="pointsLabel">我的积分</div>
            <div class="value"><span id="myPoints">0</span><span class="unit">分</span></div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('tasks')">📋 任务</div>
            <div class="tab" onclick="switchTab('rewards')">🎁 奖励</div>
            <div class="tab" onclick="switchTab('family')">👨‍👩‍👧 家庭</div>
            <div class="tab" onclick="switchTab('admin')" id="adminTab" style="display:none">⚙️ 管理</div>
        </div>

        <div class="content">
            <!-- 任务列表 -->
            <div id="tasks" class="tab-content active">
                <div id="tasksList"></div>
            </div>

            <!-- 奖励商城 -->
            <div id="rewards" class="tab-content">
                <div id="rewardsList"></div>
                <div class="section-title">我的兑换记录</div>
                <div id="myRedemptions"></div>
            </div>

            <!-- 家庭资料 -->
            <div id="family" class="tab-content">
                <div id="familyInfo"></div>
            </div>

            <!-- 排行榜 -->
            <div id="rank" class="tab-content">
                <div class="card rank-list" id="rankingList"></div>
            </div>

            <!-- 管理面板（家长） -->
            <div id="admin" class="tab-content">
                <div id="pendingRedemptions"></div>
                <div class="section-title">创建孩子账号</div>
                <div class="card">
                    <div class="form-group">
                        <input type="text" id="childUsername" placeholder="孩子用户名">
                    </div>
                    <div class="form-group">
                        <input type="password" id="childPassword" placeholder="密码">
                    </div>
                    <button class="btn" onclick="createChild()">创建账号</button>
                </div>
                <div class="section-title">积分调整</div>
                <div id="childrenList"></div>
            </div>
        </div>

        <!-- 家长浮动按钮 -->
        <button class="fab" id="addBtn" onclick="showAddModal()" style="display: none;">
            +
            <span class="badge" id="pendingBadge" style="display: none;">0</span>
        </button>
    </div>

    <!-- 添加任务/奖励模态框 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">添加任务</div>
            <div id="taskForm">
                <div class="form-group">
                    <label>任务名称</label>
                    <input type="text" id="taskTitle" placeholder="例如：整理房间">
                </div>
                <div class="form-group">
                    <label>描述（可选）</label>
                    <textarea id="taskDesc" rows="2" placeholder="任务描述"></textarea>
                </div>
                <div class="form-group">
                    <label>积分奖励</label>
                    <input type="number" id="taskPoints" value="10" min="1" max="500">
                </div>
                <div class="form-group">
                    <label>重复类型</label>
                    <select id="taskRepeat">
                        <option value="once">一次性</option>
                        <option value="daily">每日</option>
                        <option value="weekly">每周</option>
                    </select>
                </div>
            </div>
            <div id="rewardForm" style="display: none;">
                <div class="form-group">
                    <label>奖励名称</label>
                    <input type="text" id="rewardTitle" placeholder="例如：游戏时间30分钟">
                </div>
                <div class="form-group">
                    <label>描述（可选）</label>
                    <textarea id="rewardDesc" rows="2" placeholder="奖励描述"></textarea>
                </div>
                <div class="form-group">
                    <label>所需积分</label>
                    <input type="number" id="rewardCost" value="50" min="1">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal()">取消</button>
                <button class="btn" id="saveBtn" onclick="saveAdd()">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast" style="display: none;"></div>

    <script src="js/api.js"></script>
    <script>
        // 全局状态
        let currentTab = 'tasks';
        let isParent = false;
        let currentModalType = 'task';

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            if (Api.isLoggedIn()) {
                showApp();
            } else {
                showLogin();
            }
        });

        // 显示登录页
        function showLogin() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('appPage').style.display = 'none';
        }

        // 显示应用
        function showApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';

            isParent = Api.isParent();
            updateUserInfo();
            loadData();

            // 家长显示管理按钮
            document.getElementById('addBtn').style.display = isParent ? 'block' : 'none';
            document.getElementById('adminTab').style.display = isParent ? 'block' : 'none';

            // 家长隐藏积分显示（积分是孩子的）
            if (isParent) {
                document.getElementById('pointsDisplay').style.display = 'none';
            }
        }

        // 更新用户信息
        function updateUserInfo() {
            const user = Api.user;
            document.getElementById('userInfo').textContent = `${user.username} · ${user.role === 'parent' ? '家长' : '孩子'}`;
            document.getElementById('myPoints').textContent = user.points || 0;
        }

        // 切换登录标签
        function switchLoginTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        }

        // 登录
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showToast('请填写邮箱和密码');
                return;
            }

            try {
                await Api.auth.login(email, password);
                showApp();
                showToast('登录成功');
            } catch (e) {
                showToast(e.message);
            }
        }

        // 注册
        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const familyName = document.getElementById('regFamily').value.trim();

            if (!username || !email || !password) {
                showToast('请填写必填字段');
                return;
            }

            if (password.length < 6) {
                showToast('密码至少6位');
                return;
            }

            try {
                await Api.auth.register(email, password, username, familyName);
                showApp();
                showToast('注册成功');
            } catch (e) {
                showToast(e.message);
            }
        }

        // 加载数据
        async function loadData() {
            try {
                // 孩子加载积分
                if (!isParent) {
                    const pointsData = await Api.points.history();
                    Api.user.points = pointsData.current_points;
                    document.getElementById('myPoints').textContent = pointsData.current_points;
                }

                // 根据当前标签加载数据
                if (currentTab === 'tasks') {
                    loadTasks();
                } else if (currentTab === 'rewards') {
                    loadRewards();
                } else if (currentTab === 'family') {
                    loadFamily();
                } else if (currentTab === 'admin') {
                    loadAdmin();
                }

                // 加载待审批数量
                if (isParent) {
                    loadPendingCount();
                }
            } catch (e) {
                console.error('Load data error:', e);
            }
        }

        // 加载管理面板
        async function loadAdmin() {
            await loadPendingRedemptions();
            await loadChildren();
        }

        // 加载待审批兑换
        async function loadPendingRedemptions() {
            try {
                const data = await Api.rewards.pendingApprovals();
                const pending = data.pending || [];

                let html = '<div class="section-title">待审批兑换</div>';
                if (pending.length === 0) {
                    html += '<p style="color:var(--text-light);text-align:center;padding:20px">暂无待审批的兑换</p>';
                } else {
                    pending.forEach(item => {
                        html += `
                            <div class="card">
                                <div class="card-header">
                                    <span class="card-title">${item.username}</span>
                                    <span class="task-points">${item.points_spent}分</span>
                                </div>
                                <div class="card-meta">兑换: ${item.reward_title}</div>
                                <div style="display:flex;gap:8px;margin-top:10px">
                                    <button class="btn btn-sm btn-success" onclick="approveRedemption(${item.id})">通过</button>
                                    <button class="btn btn-sm btn-danger" onclick="rejectRedemption(${item.id})">拒绝</button>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('pendingRedemptions').innerHTML = html;
            } catch (e) {
                console.error(e);
            }
        }

        // 加载孩子列表
        async function loadChildren() {
            try {
                const data = await Api.family.list();
                const members = (data.members || []).filter(m => m.role === 'child');

                let html = '';
                if (members.length === 0) {
                    html = '<p style="color:var(--text-light);text-align:center;padding:20px">暂无孩子账号</p>';
                } else {
                    members.forEach(child => {
                        html += `
                            <div class="card">
                                <div class="card-header">
                                    <span class="card-title">${child.username}</span>
                                    <span class="task-points">${child.points}分</span>
                                </div>
                                <div style="display:flex;gap:8px;margin-top:10px">
                                    <button class="btn btn-sm btn-success" onclick="adjustPoints(${child.id}, '${child.username}', 10, 'bonus')">+10</button>
                                    <button class="btn btn-sm btn-success" onclick="adjustPoints(${child.id}, '${child.username}', 50, 'bonus')">+50</button>
                                    <button class="btn btn-sm btn-danger" onclick="adjustPoints(${child.id}, '${child.username}', 10, 'deduct')">-10</button>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('childrenList').innerHTML = html;
            } catch (e) {
                console.error(e);
            }
        }

        // 创建孩子账号
        async function createChild() {
            const username = document.getElementById('childUsername').value.trim();
            const password = document.getElementById('childPassword').value;

            if (!username || !password) {
                showToast('请填写用户名和密码');
                return;
            }

            try {
                await Api.auth.createChild(username, password);
                showToast('孩子账号创建成功');
                document.getElementById('childUsername').value = '';
                document.getElementById('childPassword').value = '';
                loadChildren();
                loadFamily();
            } catch (e) {
                showToast(e.message);
            }
        }

        // 调整积分
        async function adjustPoints(userId, username, amount, type) {
            try {
                await Api.points.adjust(userId, amount, type, type === 'bonus' ? '家长奖励' : '家长扣分');
                showToast(`${username} ${type === 'bonus' ? '+' : '-'}${amount}积分`);
                loadChildren();
                loadFamily();
            } catch (e) {
                showToast(e.message);
            }
        }

        // 审批兑换
        async function approveRedemption(id) {
            try {
                await Api.rewards.approve(id, 'approve');
                showToast('兑换已通过');
                loadPendingRedemptions();
                loadPendingCount();
            } catch (e) {
                showToast(e.message);
            }
        }

        async function rejectRedemption(id) {
            try {
                await Api.rewards.approve(id, 'reject');
                showToast('兑换已拒绝');
                loadPendingRedemptions();
                loadPendingCount();
            } catch (e) {
                showToast(e.message);
            }
        }

        // 加载任务
        async function loadTasks() {
            try {
                const data = await Api.tasks.list();
                const tasks = data.tasks || [];

                if (tasks.length === 0) {
                    document.getElementById('tasksList').innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📋</div>
                            <p>暂无任务</p>
                            ${isParent ? '<button class="btn btn-sm" onclick="showAddModal(\'task\')">添加任务</button>' : ''}
                        </div>
                    `;
                    return;
                }

                document.getElementById('tasksList').innerHTML = tasks.map(task => `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">${task.title}</span>
                            <span class="task-points">+${task.points}</span>
                        </div>
                        ${task.description ? `<div class="card-meta">${task.description}</div>` : ''}
                        <div class="card-meta">${getRepeatLabel(task.repeat_type)}</div>
                        ${!isParent ? `
                            <button class="btn btn-sm ${task.can_complete ? '' : 'btn-outline'}"
                                    onclick="completeTask(${task.id})"
                                    ${task.can_complete ? '' : 'disabled'}>
                                ${task.can_complete ? '完成' : '已完成'}
                            </button>
                        ` : `
                            <button class="btn btn-sm btn-outline" onclick="deleteTask(${task.id})">删除</button>
                        `}
                    </div>
                `).join('');
            } catch (e) {
                showToast('加载任务失败');
            }
        }

        // 完成任务的简化版本
        async function completeTask(taskId) {
            try {
                const result = await Api.tasks.complete(taskId);
                Api.user.points = result.new_balance;
                updateUserInfo();
                showToast(result.message);
                loadTasks();
            } catch (e) {
                showToast(e.message);
            }
        }

        // 删除任务
        async function deleteTask(taskId) {
            if (!confirm('确定删除此任务？')) return;
            try {
                await Api.tasks.delete(taskId);
                showToast('任务已删除');
                loadTasks();
            } catch (e) {
                showToast(e.message);
            }
        }

        // 加载奖励
        async function loadRewards() {
            try {
                const data = await Api.rewards.list();
                const rewards = data.rewards || [];
                const myRedemptions = data.my_redemptions || [];

                // 奖励列表
                if (rewards.length === 0) {
                    document.getElementById('rewardsList').innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🎁</div>
                            <p>暂无奖励</p>
                        </div>
                    `;
                } else {
                    document.getElementById('rewardsList').innerHTML = rewards.map(reward => `
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">${reward.title}</span>
                                <span class="task-points">${reward.points_cost}分</span>
                            </div>
                            ${reward.description ? `<div class="card-meta">${reward.description}</div>` : ''}
                            ${!isParent ? `
                                <button class="btn btn-sm btn-outline" onclick="redeemReward(${reward.id})">兑换</button>
                            ` : ''}
                        </div>
                    `).join('');
                }

                // 我的兑换记录
                if (myRedemptions.length > 0) {
                    document.getElementById('myRedemptions').innerHTML = myRedemptions.map(r => `
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">${r.reward_title}</span>
                                <span class="card-badge">${getStatusLabel(r.status)}</span>
                            </div>
                            <div class="card-meta">消耗 ${r.points_spent} 积分 · ${formatDate(r.created_at)}</div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('myRedemptions').innerHTML = '<p style="color: var(--text-light); text-align: center; padding: 20px;">暂无兑换记录</p>';
                }
            } catch (e) {
                showToast('加载奖励失败');
            }
        }

        // 兑换奖励
        async function redeemReward(rewardId) {
            try {
                const result = await Api.rewards.redeem(rewardId);
                showToast(result.message);
                loadRewards();
            } catch (e) {
                showToast(e.message);
            }
        }

        // 加载家庭资料
        async function loadFamily() {
            try {
                const data = await Api.family.list();
                const family = data.family;
                const members = data.members || [];
                const info = data.info || [];

                let html = `
                    <div class="card">
                        <div class="card-title">${family?.name || '我的家庭'}</div>
                        ${family?.invite_code ? `<div class="card-meta">邀请码：${family.invite_code}</div>` : ''}
                    </div>
                    <div class="section-title">家庭成员</div>
                `;

                members.forEach(m => {
                    html += `
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">${m.username}</span>
                                <span class="card-badge">${m.role === 'parent' ? '家长' : '孩子'}</span>
                            </div>
                            <div class="card-meta">${m.points} 积分</div>
                            ${isParent && m.role === 'child' ? `
                                <button class="btn btn-sm" onclick="showAdjustModal(${m.id}, '${m.username}')">调整积分</button>
                            ` : ''}
                        </div>
                    `;
                });

                if (info.length > 0) {
                    html += '<div class="section-title">重要日期</div>';
                    info.filter(i => i.category === 'birthday').forEach(item => {
                        html += `
                            <div class="card">
                                <div class="card-title">🎂 ${item.title}</div>
                                <div class="card-meta">${item.content}</div>
                                ${item.days_until !== undefined ? `<div class="card-meta">还有 ${item.days_until} 天</div>` : ''}
                            </div>
                        `;
                    });
                }

                document.getElementById('familyInfo').innerHTML = html;
            } catch (e) {
                showToast('加载家庭信息失败');
            }
        }

        // 加载排行榜
        async function loadRanking() {
            try {
                const data = await Api.points.ranking();
                const ranking = data.ranking || [];

                if (ranking.length === 0) {
                    document.getElementById('rankingList').innerHTML = '<p style="color: var(--text-light); text-align: center;">暂无排行数据</p>';
                    return;
                }

                document.getElementById('rankingList').innerHTML = ranking.map((item, index) => `
                    <div class="rank-item">
                        <div class="rank-num ${index < 3 ? 'top' : ''}">${index + 1}</div>
                        <div class="rank-name">${item.username} ${item.role === 'parent' ? '(家长)' : ''}</div>
                        <div class="rank-points">${item.points}分</div>
                    </div>
                `).join('');
            } catch (e) {
                showToast('加载排行失败');
            }
        }

        // 加载待审批数量
        async function loadPendingCount() {
            try {
                const data = await Api.rewards.pendingApprovals();
                const count = data.pending?.length || 0;
                const badge = document.getElementById('pendingBadge');
                if (count > 0) {
                    badge.textContent = count;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            } catch (e) {
                console.error(e);
            }
        }

        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');

            loadData();
        }

        // 显示添加模态框
        function showAddModal(type) {
            currentModalType = type || 'task';
            const modal = document.getElementById('addModal');
            modal.classList.add('show');

            document.getElementById('modalTitle').textContent = currentModalType === 'task' ? '添加任务' : '添加奖励';
            document.getElementById('taskForm').style.display = currentModalType === 'task' ? 'block' : 'none';
            document.getElementById('rewardForm').style.display = currentModalType === 'reward' ? 'block' : 'none';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('addModal').classList.remove('show');
        }

        // 保存添加
        async function saveAdd() {
            if (currentModalType === 'task') {
                const title = document.getElementById('taskTitle').value.trim();
                const description = document.getElementById('taskDesc').value.trim();
                const points = parseInt(document.getElementById('taskPoints').value) || 10;
                const repeat = document.getElementById('taskRepeat').value;

                if (!title) {
                    showToast('请输入任务名称');
                    return;
                }

                try {
                    await Api.tasks.create({ title, description, points, repeat_type: repeat });
                    showToast('任务创建成功');
                    closeModal();
                    loadTasks();
                } catch (e) {
                    showToast(e.message);
                }
            } else {
                const title = document.getElementById('rewardTitle').value.trim();
                const description = document.getElementById('rewardDesc').value.trim();
                const pointsCost = parseInt(document.getElementById('rewardCost').value) || 50;

                if (!title) {
                    showToast('请输入奖励名称');
                    return;
                }

                try {
                    await Api.rewards.create({ title, description, points_cost: pointsCost });
                    showToast('奖励添加成功');
                    closeModal();
                    loadRewards();
                } catch (e) {
                    showToast(e.message);
                }
            }
        }

        // 显示 Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // 辅助函数
        function getRepeatLabel(type) {
            const labels = { once: '一次性', daily: '每日', weekly: '每周' };
            return labels[type] || type;
        }

        function getStatusLabel(status) {
            const labels = { pending: '待审批', approved: '已通过', rejected: '已拒绝', completed: '已完成' };
            return labels[status] || status;
        }

        function logout() {
            Api.logout();
            document.getElementById('appPage').style.display = 'none';
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminTab').style.display = 'none';
            document.getElementById('pointsDisplay').style.display = 'block';
            document.getElementById('addBtn').style.display = 'none';
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
        }
    </script>
</body>
</html>
