<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF6B35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>南瓜之家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF6B35;
            --primary-light: #FF8E53;
            --bg: #f5f5f5;
            --white: #fff;
            --text: #333;
            --text-light: #888;
            --success: #4CAF50;
            --danger: #f44336;
            --border: #eee;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 70px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; }
        .header .logout { color: white; font-size: 12px; opacity: 0.8; cursor: pointer; }

        /* Nav */
        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: var(--white);
            display: flex;
            border-top: 1px solid var(--border);
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
            color: var(--text-light);
            font-size: 11px;
            position: relative;
            transition: color 0.2s;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item .icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item .badge {
            position: absolute;
            top: 4px;
            right: 20%;
            background: var(--danger);
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Page */
        .page { display: none; padding: 16px; padding-bottom: 80px; }
        .page.active { display: block; }

        /* Announcement */
        .announcement-bar {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
            color: white;
            cursor: pointer;
            position: relative;
        }
        .announcement-bar .ann-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .announcement-bar .ann-content { font-size: 13px; opacity: 0.9; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .announcement-bar .ann-time { font-size: 11px; opacity: 0.7; margin-top: 6px; }
        .announcement-bar .ann-edit { position: absolute; top: 10px; right: 10px; font-size: 12px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }
        .announcement-bar.pinned { border: 2px solid rgba(255,255,255,0.5); }
        .announcement-empty { background: var(--white); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; color: var(--text-light); font-size: 13px; text-align: center; cursor: pointer; }

        /* Calendar */
        .calendar-wrap { background: var(--white); border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .cal-header .cal-title { font-size: 15px; font-weight: 600; }
        .cal-header .cal-nav { display: flex; gap: 8px; }
        .cal-header .cal-nav button { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px 8px; color: var(--primary); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
        .cal-weekday { font-size: 11px; color: var(--text-light); padding: 4px 0; }
        .cal-day { font-size: 13px; padding: 6px 2px; border-radius: 50%; cursor: pointer; position: relative; }
        .cal-day:hover { background: #f0f0f0; }
        .cal-day.today { background: var(--primary); color: white; font-weight: bold; }
        .cal-day.other-month { color: #ccc; }
        .cal-day.has-event::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--primary); }
        .cal-day.selected { background: #fff3ee; border: 2px solid var(--primary); }
        .cal-events { margin-top: 12px; }
        .cal-event-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .cal-event-item:last-child { border-bottom: none; }
        .cal-event-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .cal-event-dot.travel { background: #2196F3; }
        .cal-event-dot.event { background: var(--primary); }
        .cal-event-dot.birthday { background: #e91e63; }
        .cal-event-dot.reward { background: #9C27B0; }
        .cal-event-date { font-size: 12px; color: var(--text-light); min-width: 40px; }
        .cal-event-title { font-size: 13px; flex: 1; }
        .cal-no-events { font-size: 13px; color: var(--text-light); padding: 8px 0; text-align: center; }

        /* Card */
        .card { background: var(--white); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .card-meta { font-size: 13px; color: var(--text-light); margin-bottom: 4px; }

        /* Points */
        .points-big { text-align: center; padding: 30px 20px; }
        .points-big .label { font-size: 14px; color: var(--text-light); }
        .points-big .value { font-size: 56px; color: var(--primary); font-weight: bold; line-height: 1.2; }
        .points-big .unit { font-size: 20px; color: var(--primary-light); }

        /* Buttons */
        .btn { display: inline-block; background: var(--primary); color: white; padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; text-align: center; }
        .btn:hover { opacity: 0.9; }
        .btn-block { width: 100%; }
        .btn-sm { padding: 8px 12px; font-size: 13px; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-ghost { background: transparent; color: var(--text-light); }

        /* Tag */
        .tag { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; background: #fff3e0; color: var(--primary); }
        .tag-success { background: #e8f5e9; color: var(--success); }
        .tag-danger { background: #ffebee; color: var(--danger); }
        .tag-pending { background: #fff8e1; color: #f9a825; }

        /* List item */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
        .list-item:last-child { border-bottom: none; }

        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; color: var(--text-light); margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px;
            font-size: 16px; font-family: inherit; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; }
        .modal.show { display: flex; }
        .modal-content { background: var(--white); width: 100%; border-radius: 16px 16px 0 0; padding: 20px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header .close-btn { font-size: 20px; color: var(--text-light); cursor: pointer; }
        .modal-footer { display: flex; gap: 12px; margin-top: 20px; }
        .modal-footer .btn { flex: 1; }

        /* Toast */
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 300; animation: fadeIn 0.3s; max-width: 360px; text-align: center; }
        .toast.error { background: var(--danger); }
        .toast.success { background: var(--success); }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } }

        /* Empty */
        .empty { text-align: center; padding: 40px 20px; color: var(--text-light); }
        .empty .icon { font-size: 48px; margin-bottom: 12px; }

        /* Section title */
        .section-title { font-size: 14px; color: var(--text-light); margin: 20px 0 12px; padding-left: 8px; border-left: 3px solid var(--primary); }

        /* Stat */
        .stat-card { text-align: center; padding: 16px; background: var(--white); border-radius: 12px; }
        .stat-card .num { font-size: 28px; color: var(--primary); font-weight: bold; }
        .stat-card .label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

        /* Login */
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-light)); padding: 20px; }
        .login-card { background: var(--white); border-radius: 16px; padding: 32px 24px; width: 100%; max-width: 320px; }
        .login-card h2 { text-align: center; font-size: 24px; color: var(--primary); margin-bottom: 4px; }
        .login-card .subtitle { text-align: center; color: var(--text-light); font-size: 13px; margin-bottom: 24px; }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; font-family: inherit; }
        .login-card input:focus { outline: none; border-color: var(--primary); }
        .login-card .hint { font-size: 12px; color: var(--text-light); text-align: center; margin-top: 16px; }
        .login-card .hint a { color: var(--primary); cursor: pointer; }

        /* FAB */
        .fab { position: fixed; bottom: 80px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--primary); color: white; font-size: 24px; border: none; cursor: pointer; box-shadow: 0 4px 12px rgba(255,107,53,0.4); z-index: 50; display: none; }
        .fab.show { display: block; }

        /* Member grid */
        .member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .member-btn { padding: 16px 12px; border: 2px solid var(--border); border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--white); }
        .member-btn:hover { border-color: var(--primary-light); }
        .member-btn.selected { border-color: var(--primary); background: #fff3ee; }
        .member-btn .avatar { font-size: 32px; margin-bottom: 4px; }
        .member-btn .name { font-size: 14px; font-weight: 600; }
        .member-btn .role { font-size: 11px; color: var(--text-light); }

        /* Adjust child row */
        .adjust-child { background: var(--white); border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .adjust-child .pts { color: var(--primary); font-weight: bold; font-size: 14px; }
        .adjust-btns { display: flex; gap: 4px; }

        /* Category picker */
        .cat-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .cat-picker .cat-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); background: var(--white); font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .cat-picker .cat-btn.selected { border-color: var(--primary); background: #fff3ee; color: var(--primary); }

        /* Event type legend */
        .event-legend { display: flex; gap: 12px; flex-wrap: wrap; padding: 8px 0; }
        .event-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-light); }
        .event-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <h2>🎃 南瓜之家</h2>
            <p class="subtitle">家庭积分管理系统</p>
            <div id="memberSelectSection">
                <div class="member-grid" id="memberGrid"></div>
                <div id="pwdSection" style="display:none">
                    <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
                    <button class="btn btn-block" onclick="handleLogin()">进入</button>
                </div>
                <p class="hint">首次使用请先 <a onclick="showSetup()">初始化设置</a></p>
            </div>
            <div id="setupSection" style="display:none">
                <p class="subtitle" style="margin-bottom:16px">初始化家庭设置</p>
                <div class="member-grid" id="setupMemberGrid"></div>
                <div id="setupPwdSection" style="display:none">
                    <input type="password" id="setupPassword" placeholder="设置密码（至少6位）" autocomplete="new-password">
                    <input type="password" id="setupPassword2" placeholder="确认密码" autocomplete="new-password">
                    <button class="btn btn-block" onclick="handleSetup()">完成设置</button>
                </div>
                <p class="hint"><a onclick="showMemberSelect()">返回登录</a></p>
            </div>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="appPage" style="display:none">
        <div class="header">
            <div class="header-top">
                <h1>🎃 南瓜之家</h1>
                <span class="logout" onclick="doLogout()">退出</span>
            </div>
            <div style="font-size:12px;opacity:0.9;margin-top:4px" id="userInfo"></div>
        </div>

        <!-- 底部导航 -->
        <nav class="nav">
            <div class="nav-item active" onclick="switchPage('home')">
                <span class="icon">🏠</span><span>首页</span>
            </div>
            <div class="nav-item" onclick="switchPage('tasks')">
                <span class="icon">📋</span><span>任务</span>
            </div>
            <div class="nav-item" onclick="switchPage('shop')">
                <span class="icon">🎁</span><span>商城</span>
            </div>
            <div class="nav-item" onclick="switchPage('calendar')">
                <span class="icon">📅</span><span>日历</span>
            </div>
            <div class="nav-item" onclick="switchPage('settings')" id="settingsNav">
                <span class="icon">⚙️</span><span>我的</span>
            </div>
        </nav>

        <!-- 首页 -->
        <div id="homePage" class="page active">
            <div id="homeContent"></div>
        </div>

        <!-- 任务页 -->
        <div id="tasksPage" class="page">
            <button class="fab" id="addTaskFab" onclick="showAddTask()">+</button>
            <div id="tasksContent"></div>
        </div>

        <!-- 商城页 -->
        <div id="shopPage" class="page">
            <button class="fab" id="addRewardFab" onclick="showAddReward()">+</button>
            <div id="shopContent"></div>
        </div>

        <!-- 日历页 -->
        <div id="calendarPage" class="page">
            <div id="calendarContent"></div>
        </div>

        <!-- 我的页 -->
        <div id="settingsPage" class="page">
            <div id="settingsContent"></div>
        </div>
    </div>

    <!-- 模态框们 -->
    <!-- 任务 -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="taskModalTitle">添加任务</span>
                <span class="close-btn" onclick="closeTaskModal()">✕</span>
            </div>
            <input type="hidden" id="editTaskId">
            <div class="form-group"><label>任务名称 *</label><input type="text" id="taskName" placeholder="例如：整理房间"></div>
            <div class="form-group"><label>描述（可选）</label><textarea id="taskDesc" rows="2" placeholder="任务要求"></textarea></div>
            <div class="form-group"><label>积分奖励 *</label><input type="number" id="taskPoints" value="10" min="1" max="500"></div>
            <div class="form-group"><label>重复类型</label>
                <select id="taskRepeat">
                    <option value="once">一次性</option>
                    <option value="daily">每日</option>
                    <option value="weekly">每周</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeTaskModal()">取消</button>
                <button class="btn" onclick="saveTask()">保存</button>
            </div>
        </div>
    </div>

    <!-- 奖励 -->
    <div class="modal" id="rewardModal">
        <div class="modal-content">
            <div class="modal-header"><span>添加奖励</span><span class="close-btn" onclick="closeRewardModal()">✕</span></div>
            <div class="form-group"><label>奖励名称 *</label><input type="text" id="rewardName" placeholder="例如：游戏时间30分钟"></div>
            <div class="form-group"><label>描述说明</label><textarea id="rewardDesc" rows="2" placeholder="奖励内容描述"></textarea></div>
            <div class="form-group"><label>所需积分 *</label><input type="number" id="rewardCost" value="50" min="1"></div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeRewardModal()">取消</button>
                <button class="btn" onclick="saveReward()">保存</button>
            </div>
        </div>
    </div>

    <!-- 公告 -->
    <div class="modal" id="announceModal">
        <div class="modal-content">
            <div class="modal-header"><span id="announceModalTitle">发布公告</span><span class="close-btn" onclick="closeAnnounceModal()">✕</span></div>
            <input type="hidden" id="editAnnounceId">
            <div class="form-group"><label>公告标题 *</label><input type="text" id="announceTitle" placeholder="公告主题"></div>
            <div class="form-group"><label>公告内容</label><textarea id="announceContent" rows="4" placeholder="详细内容..."></textarea></div>
            <div class="form-group" style="display:flex;align-items:center;gap:8px">
                <input type="checkbox" id="announcePinned" style="width:auto">
                <label style="margin:0;font-size:14px">置顶公告</label>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeAnnounceModal()">取消</button>
                <button class="btn" id="announceSaveBtn" onclick="saveAnnouncement()">发布</button>
            </div>
        </div>
    </div>

    <!-- 日历事件 -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <div class="modal-header"><span id="eventModalTitle">添加日程</span><span class="close-btn" onclick="closeEventModal()">✕</span></div>
            <input type="hidden" id="editEventId">
            <div class="form-group"><label>日程标题 *</label><input type="text" id="eventTitle" placeholder="例如：暑假海南游"></div>
            <div class="form-group"><label>日期 *</label><input type="date" id="eventDate"></div>
            <div class="form-group"><label>类型</label>
                <div class="cat-picker" id="eventCatPicker">
                    <button class="cat-btn selected" data-val="event" onclick="pickEventCat(this)">📌 普通</button>
                    <button class="cat-btn" data-val="travel" onclick="pickEventCat(this)">✈️ 旅游</button>
                    <button class="cat-btn" data-val="birthday" onclick="pickEventCat(this)">🎂 生日</button>
                    <button class="cat-btn" data-val="reward" onclick="pickEventCat(this)">🎁 奖励</button>
                </div>
                <input type="hidden" id="eventCategory" value="event">
            </div>
            <div class="form-group"><label>备注</label><textarea id="eventDesc" rows="3" placeholder="详细说明..."></textarea></div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="eventDeleteBtn" style="display:none;flex:0.5" onclick="deleteEvent()">删除</button>
                <button class="btn btn-outline" onclick="closeEventModal()">取消</button>
                <button class="btn" onclick="saveEvent()">保存</button>
            </div>
        </div>
    </div>

    <!-- 积分调整 -->
    <div class="modal" id="adjustModal">
        <div class="modal-content">
            <div class="modal-header"><span>调整积分</span><span class="close-btn" onclick="closeAdjustModal()">✕</span></div>
            <input type="hidden" id="adjustUserId">
            <div id="adjustChildName" style="font-weight:600;font-size:16px;margin-bottom:16px;text-align:center"></div>
            <div class="form-group"><label>调整积分 *</label><input type="number" id="adjustAmount" value="10" min="1"></div>
            <div class="form-group"><label>原因说明 *</label><input type="text" id="adjustNote" placeholder="例如：主动帮忙洗碗"></div>
            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
                <button class="btn btn-sm btn-success" onclick="setAdjustVal(10)">+10</button>
                <button class="btn btn-sm btn-success" onclick="setAdjustVal(20)">+20</button>
                <button class="btn btn-sm btn-success" onclick="setAdjustVal(50)">+50</button>
                <button class="btn btn-sm btn-success" onclick="setAdjustVal(100)">+100</button>
                <button class="btn btn-sm btn-danger" onclick="setAdjustVal(-10)">-10</button>
                <button class="btn btn-sm btn-danger" onclick="setAdjustVal(-20)">-20</button>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeAdjustModal()">取消</button>
                <button class="btn btn-success" onclick="confirmAdjust()">确认调整</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" style="display:none"></div>

    <script src="js/api.js"></script>
    <script>
        // ========== 全局状态 ==========
        let currentPage = 'home';
        let selectedMemberId = null;
        let selectedMemberName = '';
        let setupSelectedMember = null;

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', async () => {
            if (Api.isLoggedIn()) {
                const fresh = await refreshUserInfo();
                if (fresh) showApp();
                else { Api.logout(); showLogin(); }
            } else {
                showLogin();
            }
        });

        function showLogin() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('appPage').style.display = 'none';
            selectedMemberId = null;
            setupSelectedMember = null;
            loadMemberList();
        }

        async function refreshUserInfo() {
            try {
                const data = await Api.auth.getProfile();

        function renderGrid(container, members, isSetup) {
            container.innerHTML = members.map(m => `
                <div class="member-btn" data-id="${m.id}" data-role="${m.role}" data-name="${m.username}" data-avatar="${m.avatar}">
                    <div class="avatar">${m.avatar}</div>
                    <div class="name">${m.username}</div>
                    <div class="role">${m.role === 'parent' ? '家长' : '孩子'}</div>
                </div>
            `).join('');
            container.querySelectorAll('.member-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    container.querySelectorAll('.member-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    const id = btn.dataset.id, role = btn.dataset.role, name = btn.dataset.name;
                    if (isSetup) {
                        setupSelectedMember = { id, role, name };
                        document.getElementById('setupPwdSection').style.display = 'block';
                    } else {
                        selectedMemberId = id; selectedMemberName = name;
                        document.getElementById('pwdSection').style.display = 'block';

                });

        // ========== 日历页 ==========
        let calYear = new Date().getFullYear();
        let calMonth = new Date().getMonth() + 1;
        let calSelectedDate = null;

        async function loadCalendarPage() {
            const canOperate = Api.canOperate();
            let html = '<div class="calendar-wrap">';

            // 月份导航
            const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
            html += '<div class="cal-header">';
            html += '<span class="cal-title">' + calYear + '年 ' + monthNames[calMonth - 1] + '</span>';
            html += '<div class="cal-nav">';
            html += '<button onclick="calNav(-1)">◀</button>';
            html += '<button onclick="calNav(0)">今天</button>';
            html += '<button onclick="calNav(1)">▶</button>';
            html += '</div></div>';

            // 星期标题
            const weekdays = ['日','一','二','三','四','五','六'];
            html += '<div class="cal-grid">';
            weekdays.forEach(d => html += '<div class="cal-weekday">' + d + '</div>');

            // 获取当月事件
            let eventsMap = {};
            let birthdayMap = {};
            try {
                const data = await Api.events.list(calYear, calMonth);
                (data.events || []).forEach(e => {
                    const day = parseInt(e.event_date.split('-')[2]);
                    if (!eventsMap[day]) eventsMap[day] = [];
                    eventsMap[day].push(e);
                });
                (data.birthdays || []).forEach(b => {
                    const day = parseInt(b.event_date.split('-')[2]);
                    if (!birthdayMap[day]) birthdayMap[day] = [];
                    birthdayMap[day].push(b);
                });
            } catch {}

            // 构建日历格子
            const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
            const daysInMonth = new Date(calYear, calMonth, 0).getDate();
            const today = new Date();
            const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

            for (let i = 0; i < firstDay; i++) {
                const prevDays = new Date(calYear, calMonth - 1, 0).getDate();
                html += '<div class="cal-day other-month">' + (prevDays - firstDay + 1 + i) + '</div>';
            }
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = calYear + '-' + String(calMonth).padStart(2,'0') + '-' + String(d).padStart(2,'0');
                const isToday = dateStr === todayStr;
                const hasEvent = eventsMap[d] && eventsMap[d].length > 0;
                const hasBirthday = birthdayMap[d] && birthdayMap[d].length > 0;
                const isSelected = calSelectedDate === dateStr;
                let cls = 'cal-day';
                if (isToday) cls += ' today';
                if (hasEvent || hasBirthday) cls += ' has-event';
                if (isSelected) cls += ' selected';
                html += '<div class="' + cls + '" onclick="calSelect(' + d + ',\'' + dateStr + '\')">' + d + '</div>';
            }
            html += '</div></div>';

            // 图例
            html += '<div class="event-legend">';
            html += '<div class="event-legend-item"><div class="event-legend-dot" style="background:var(--primary)"></div>普通</div>';
            html += '<div class="event-legend-item"><div class="event-legend-dot" style="background:#2196F3"></div>旅游</div>';
            html += '<div class="event-legend-item"><div class="event-legend-dot" style="background:#e91e63"></div>生日</div>';
            html += '<div class="event-legend-item"><div class="event-legend-dot" style="background:#9C27B0"></div>奖励</div>';
            html += '</div>';

            // 选中日期的事件
            if (calSelectedDate) {
                html += '<div id="calDayEvents"></div>';
            }

            // 添加按钮（爸妈）
            if (canOperate) {
                html += '<button class="btn btn-sm" style="margin-top:12px" onclick="openAddEvent()">+ 添加日程</button>';
            }

            document.getElementById('calendarContent').innerHTML = html;

            // 加载选中日期事件
            if (calSelectedDate) await loadCalDayEvents();
        }

        function calNav(dir) {
            if (dir === 0) { calYear = new Date().getFullYear(); calMonth = new Date().getMonth() + 1; calSelectedDate = null; }
            else { calMonth += dir; if (calMonth > 12) { calMonth = 1; calYear++; } if (calMonth < 1) { calMonth = 12; calYear--; } }
            loadCalendarPage();
        }

        async function calSelect(day, dateStr) {
            calSelectedDate = dateStr;
            document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            await loadCalDayEvents();
        }

        async function loadCalDayEvents() {
            if (!calSelectedDate) return;
            const el = document.getElementById('calDayEvents');
            if (!el) return;

            let html = '<div class="section-title">' + calSelectedDate + ' 日程</div><div class="card cal-events">';
            try {
                const data = await Api.events.list(calYear, calMonth);
                const dayEvents = (data.events || []).filter(e => e.event_date === calSelectedDate);

                if (dayEvents.length === 0) {
                    html += '<div class="cal-no-events">暂无日程</div>';
                } else {
                    dayEvents.forEach(ev => {
                        const dotCls = { travel: 'travel', birthday: 'birthday', reward: 'reward' }[ev.category] || 'event';
                        html += '<div class="cal-event-item">';
                        html += '<div class="cal-event-dot ' + dotCls + '"></div>';
                        html += '<div class="cal-event-title">' + escapeHtml(ev.title) + '</div>';
                        if (Api.canOperate()) html += '<button class="btn btn-sm btn-ghost" onclick="openEditEvent(' + ev.id + ')">编辑</button>';
                        html += '</div>';
                        if (ev.description) html += '<div style="font-size:13px;color:var(--text-light);padding:0 0 8px 18px">' + escapeHtml(ev.description) + '</div>';
                    });
                }
                // 生日
                const bdays = (data.birthdays || []).filter(b => {
                    const bdayDay = parseInt(b.event_date.split('-')[2]);
                    return bdayDay === parseInt(calSelectedDate.split('-')[2]);
                });
                bdays.forEach(b => {
                    html += '<div class="cal-event-item">';
                    html += '<div class="cal-event-dot birthday"></div>';
                    html += '<div class="cal-event-title">' + escapeHtml(b.title) + ' (' + b.days_until + '天后)</div>';
                    html += '</div>';
                });
            } catch (e) { html += '<div class="cal-no-events">加载失败</div>'; }
            html += '</div>';
            el.innerHTML = html;
        }

        function openAddEvent() {
            document.getElementById('eventModalTitle').textContent = '添加日程';
            document.getElementById('editEventId').value = '';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDate').value = calSelectedDate || '';
            document.getElementById('eventCategory').value = 'event';
            document.getElementById('eventDesc').value = '';
            document.getElementById('eventDeleteBtn').style.display = 'none';
            document.querySelectorAll('#eventCatPicker .cat-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector('#eventCatPicker .cat-btn').classList.add('selected');
            document.getElementById('eventModal').classList.add('show');
        }

        async function openEditEvent(id) {
            try {
                const data = await Api.events.list(calYear, calMonth);
                const ev = (data.events || []).find(e => e.id === id);
                if (!ev) return;
                document.getElementById('eventModalTitle').textContent = '编辑日程';
                document.getElementById('editEventId').value = id;
                document.getElementById('eventTitle').value = ev.title;
                document.getElementById('eventDate').value = ev.event_date;
                document.getElementById('eventCategory').value = ev.category;
                document.getElementById('eventDesc').value = ev.description || '';
                document.getElementById('eventDeleteBtn').style.display = '';
                document.querySelectorAll('#eventCatPicker .cat-btn').forEach(b => { b.classList.toggle('selected', b.dataset.val === ev.category); });
                document.getElementById('eventModal').classList.add('show');
            } catch {}
        }

        function pickEventCat(btn) {
            document.querySelectorAll('#eventCatPicker .cat-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('eventCategory').value = btn.dataset.val;
        }

        function closeEventModal() { document.getElementById('eventModal').classList.remove('show'); }

        async function saveEvent() {
            const id = document.getElementById('editEventId').value;
            const title = document.getElementById('eventTitle').value.trim();
            const date = document.getElementById('eventDate').value;
            const category = document.getElementById('eventCategory').value;
            const description = document.getElementById('eventDesc').value.trim();
            if (!title || !date) { showToast('请填写标题和日期', 'error'); return; }
            try {
                if (id) { await Api.events.update({ id, title, event_date: date, category, description }); showToast('日程已更新', 'success'); }
                else { await Api.events.create({ title, event_date: date, category, description }); showToast('日程已添加', 'success'); }
                closeEventModal();
                await loadCalendarPage();
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function deleteEvent() {
            const id = document.getElementById('editEventId').value;
            if (!confirm('确定删除该日程？')) return;
            try { await Api.events.delete(id); showToast('已删除', 'success'); closeEventModal(); await loadCalendarPage(); } catch (e) { showToast(e.message, 'error'); }
        }

        // ========== 我的页面 ==========
        async function loadSettingsPage() {
            const canOperate = Api.canOperate();
            const canManageMembers = Api.canManageMembers();
            const isChild = Api.isChild();
            let html = '';

            if (canManageMembers) {
                // 爸爸：成员账号管理
                html += '<div class="section-title">👨‍👩‍👧 成员账号管理</div>';
                html += '<div class="card">';
                html += '<div class="form-group"><label>添加成员</label>';
                html += '<input type="text" id="memberName" placeholder="成员名称">';
                html += '<select id="memberRole" style="margin-top:8px"><option value="child">孩子</option><option value="parent">家长</option></select>';
                html += '<input type="password" id="memberPass" placeholder="设置密码（至少6位）" style="margin-top:8px">';
                html += '<button class="btn btn-sm" style="margin-top:8px" onclick="doCreateMember()">添加</button></div></div>';

                try {
                    const fd = await Api.family.list();
                    const parents = (fd.members || []).filter(m => m.role === 'parent');
                    const children = (fd.members || []).filter(m => m.role === 'child');
                    if (parents.length > 0) {
                        html += '<div style="margin-top:8px"><strong style="font-size:13px;color:var(--text-light)">家长</strong></div>';
                        parents.forEach(m => {
                            html += '<div class="card"><div class="list-item" style="padding:0;border:none">';
                            html += '<div style="font-weight:600">' + m.username + '</div>';
                            html += '</div></div>';
                        });
                    }
                    if (children.length > 0) {
                        html += '<div style="margin-top:8px"><strong style="font-size:13px;color:var(--text-light)">孩子</strong></div>';
                        children.forEach(c => {
                            html += '<div class="card"><div class="list-item" style="padding:0;border:none">';
                            html += '<div><div style="font-weight:600">' + c.username + '</div><div style="font-size:13px;color:var(--text-light)">积分: ' + c.points + '</div></div>';
                            html += '</div></div>';
                        });
                    }
                } catch (e) {}
            }

            if (canOperate) {
                // 积分调整说明
                html += '<div class="section-title">💰 积分调整说明</div>';
                html += '<div class="card"><div style="font-size:13px;color:var(--text-light);line-height:1.8">';
                html += '• 首页点击孩子积分卡片的按钮可快速调整积分<br>';
                html += '• <b style="color:var(--success)">奖励</b>：孩子表现好时加分，请填写原因<br>';
                html += '• <b style="color:var(--danger)">扣分</b>：需填写具体原因，孩子可在积分明细中查看<br>';
                html += '• 积分调整会记录在孩子的积分明细历史中';
                html += '</div></div>';

                // 生日管理
                html += '<div class="section-title">🎂 生日管理</div>';
                html += '<div class="card"><div class="form-group"><label>添加生日</label>';
                html += '<input type="text" id="birthdayName" placeholder="成员名称">';
                html += '<input type="date" id="birthdayDate" style="margin-top:8px">';
                html += '<button class="btn btn-sm" style="margin-top:8px" onclick="doAddBirthday()">添加</button></div></div>';
                html += '<div id="birthdayList"></div>';

                // 证件管理
                html += '<div class="section-title">📁 证件管理</div>';
                html += '<div class="card"><div class="form-group"><label>添加证件</label>';
                html += '<input type="text" id="docName" placeholder="证件名称">';
                html += '<input type="text" id="docInfo" placeholder="证件号码" style="margin-top:8px">';
                html += '<button class="btn btn-sm" style="margin-top:8px" onclick="doAddDocument()">添加</button></div></div>';
                html += '<div id="documentList"></div>';

                loadFamilyInfo();
            }

            if (isChild) {
                // 孩子：积分历史
                html += '<div class="section-title">💰 积分明细</div><div class="card">';
                try {
                    const data = await Api.points.history();
                    const history = data.history || [];
                    if (history.length === 0) html += '<p style="text-align:center;color:var(--text-light)">暂无积分记录</p>';
                    else history.forEach(h => {
                        const sign = h.amount > 0 ? '+' : '';
                        const color = h.amount > 0 ? 'var(--success)' : 'var(--danger)';
                        html += '<div class="list-item" style="padding:10px 0">';
                        html += '<div><div>' + escapeHtml(h.note || getTypeText(h.type)) + '</div>';
                        html += '<div style="font-size:12px;color:var(--text-light)">' + formatDate(h.created_at) + '</div></div>';
                        html += '<div style="color:' + color + ';font-weight:600">' + sign + h.amount + '</div></div>';
                    });
                } catch (e) { html += '<p>加载失败</p>'; }
                html += '</div>';
            }

            document.getElementById('settingsContent').innerHTML = html;
        }

        async function loadFamilyInfo() {
            try {
                const data = await Api.family.list();
                const info = data.info || [];

                const birthdays = info.filter(i => i.category === 'birthday');
                let bHtml = birthdays.length === 0 ? '<div class="card"><p style="text-align:center;color:var(--text-light)">暂无生日记录</p></div>' : '';
                birthdays.forEach(b => {
                    bHtml += '<div class="card"><div class="list-item" style="padding:0;border:none">';
                    bHtml += '<div><div style="font-weight:600">🎂 ' + escapeHtml(b.title) + '</div>';
                    bHtml += '<div style="font-size:13px;color:var(--text-light)">' + b.content + '（' + b.days_until + '天后）</div></div>';
                    bHtml += '<button class="btn btn-sm btn-danger" onclick="doDeleteFamilyInfo(' + b.id + ')">删除</button></div></div>';
                });
                const el = document.getElementById('birthdayList');
                if (el) el.innerHTML = bHtml;

                const docs = info.filter(i => i.category === 'document');
                let dHtml = docs.length === 0 ? '<div class="card"><p style="text-align:center;color:var(--text-light)">暂无证件记录</p></div>' : '';
                docs.forEach(d => {
                    dHtml += '<div class="card"><div class="list-item" style="padding:0;border:none">';
                    dHtml += '<div><div style="font-weight:600">📄 ' + escapeHtml(d.title) + '</div>';
                    dHtml += '<div style="font-size:13px;color:var(--text-light)">' + escapeHtml(d.content) + '</div></div>';
                    dHtml += '<button class="btn btn-sm btn-danger" onclick="doDeleteFamilyInfo(' + d.id + ')">删除</button></div></div>';
                });
                const el2 = document.getElementById('documentList');
                if (el2) el2.innerHTML = dHtml;
            } catch (e) { console.error(e); }
        }

        async function doCreateMember() {
            const name = document.getElementById('memberName').value.trim();
            const role = document.getElementById('memberRole').value;
            const pass = document.getElementById('memberPass').value;
            if (!name || !pass) { showToast('请填写名称和密码', 'error'); return; }
            if (pass.length < 6) { showToast('密码至少6位', 'error'); return; }
            try {
                if (role === 'child') await Api.auth.createChild(name, pass);
                else await Api.auth.createParent(name, pass);
                showToast('成员已添加', 'success');
                document.getElementById('memberName').value = '';
                document.getElementById('memberPass').value = '';
                loadSettingsPage();
            } catch (e) { showToast(e.message, 'error'); }
        }

        function openAdjustModal(userId, userName, presetVal) {
            document.getElementById('adjustUserId').value = userId;
            document.getElementById('adjustChildName').textContent = userName;
            document.getElementById('adjustAmount').value = Math.abs(presetVal);
            document.getElementById('adjustNote').value = '';
            document.getElementById('adjustModal').classList.add('show');
        }

        function setAdjustVal(v) { document.getElementById('adjustAmount').value = Math.abs(v); }
        function closeAdjustModal() { document.getElementById('adjustModal').classList.remove('show'); }

        async function confirmAdjust() {
            const userId = parseInt(document.getElementById('adjustUserId').value);
            const amount = parseInt(document.getElementById('adjustAmount').value);
            const note = document.getElementById('adjustNote').value.trim();
            if (!note) { showToast('请填写调整原因', 'error'); return; }
            const type = amount > 0 ? 'bonus' : 'deduct';
            try { await Api.points.adjust(userId, Math.abs(amount), type, note); showToast((amount > 0 ? '+' : '') + amount + '分（' + note + '）', 'success'); closeAdjustModal(); loadHomePage(); } catch (e) { showToast(e.message, 'error'); }
        }

        async function doAddBirthday() {
            const name = document.getElementById('birthdayName').value.trim();
            const date = document.getElementById('birthdayDate').value;
            if (!name || !date) { showToast('请填写名称和日期', 'error'); return; }
            try { await Api.family.create({ category: 'birthday', title: name, content: date }); showToast('生日已添加', 'success'); document.getElementById('birthdayName').value = ''; document.getElementById('birthdayDate').value = ''; loadFamilyInfo(); } catch (e) { showToast(e.message, 'error'); }
        }

        async function doAddDocument() {
            const name = document.getElementById('docName').value.trim();
            const info = document.getElementById('docInfo').value.trim();
            if (!name || !info) { showToast('请填写证件名称和信息', 'error'); return; }
            try { await Api.family.create({ category: 'document', title: name, content: info }); showToast('证件已添加', 'success'); document.getElementById('docName').value = ''; document.getElementById('docInfo').value = ''; loadFamilyInfo(); } catch (e) { showToast(e.message, 'error'); }
        }

        async function doDeleteFamilyInfo(id) {
            if (!confirm('确定删除？')) return;
            try { await Api.family.delete(id); showToast('已删除', 'success'); loadFamilyInfo(); } catch (e) { showToast(e.message, 'error'); }
        }

        // ========== 工具函数 ==========
        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.className = 'toast' + (type ? ' ' + type : '');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function getRepeatText(type) { return { once: '一次性', daily: '每日', weekly: '每周' }[type] || type; }
        function getTypeText(type) { return { earn: '完成任务', redeem: '兑换奖励', bonus: '奖励加分', deduct: '扣分' }[type] || type; }

        function formatDate(str) {
            if (!str) return '';
            const d = new Date(str);
            return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
        }
    </script>
</body>
</html>
