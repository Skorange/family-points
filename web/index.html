<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF6B35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>南瓜之家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF6B35;
            --primary-light: #FF8E53;
            --bg: #f5f5f5;
            --white: #fff;
            --text: #333;
            --text-light: #888;
            --success: #4CAF50;
            --danger: #f44336;
            --border: #eee;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 70px;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 18px; }
        .header .logout { color: white; font-size: 12px; opacity: 0.8; cursor: pointer; }
        .header .logout:hover { opacity: 1; }

        /* 导航栏 */
        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: var(--white);
            display: flex;
            border-top: 1px solid var(--border);
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
            color: var(--text-light);
            font-size: 11px;
            position: relative;
            transition: color 0.2s;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item .icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item .badge {
            position: absolute;
            top: 4px;
            right: 20%;
            background: var(--danger);
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 页面内容 */
        .page { display: none; padding: 16px; padding-bottom: 80px; }
        .page.active { display: block; }

        /* 公告 */
        .announcement-bar {
            background: linear-gradient(135deg, #FF6B35, #FF8E53);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
            color: white;
            cursor: pointer;
            position: relative;
        }
        .announcement-bar .ann-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .announcement-bar .ann-content { font-size: 13px; opacity: 0.9; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .announcement-bar .ann-time { font-size: 11px; opacity: 0.7; margin-top: 6px; }
        .announcement-bar .ann-edit {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            opacity: 0.8;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .announcement-bar.pinned {
            border: 2px solid rgba(255,255,255,0.5);
        }
        .announcement-empty {
            background: var(--white);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
            color: var(--text-light);
            font-size: 13px;
            text-align: center;
            cursor: pointer;
        }

        /* 卡片 */
        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .card-meta { font-size: 13px; color: var(--text-light); margin-bottom: 4px; }

        /* 积分显示 */
        .points-big {
            text-align: center;
            padding: 30px 20px;
        }
        .points-big .label { font-size: 14px; color: var(--text-light); }
        .points-big .value { font-size: 56px; color: var(--primary); font-weight: bold; line-height: 1.2; }
        .points-big .unit { font-size: 20px; color: var(--primary-light); }

        /* 按钮 */
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
        }
        .btn:hover { opacity: 0.9; }
        .btn-block { width: 100%; }
        .btn-sm { padding: 8px 12px; font-size: 13px; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-ghost { background: transparent; color: var(--text-light); }

        /* 标签 */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            background: #fff3e0;
            color: var(--primary);
        }
        .tag-success { background: #e8f5e9; color: var(--success); }
        .tag-danger { background: #ffebee; color: var(--danger); }
        .tag-pending { background: #fff8e1; color: #f9a825; }

        /* 列表项 */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        .list-item:last-child { border-bottom: none; }

        /* 表单 */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; color: var(--text-light); margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: flex-end;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--white);
            width: 100%;
            border-radius: 16px 16px 0 0;
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header .close-btn { font-size: 20px; color: var(--text-light); cursor: pointer; }
        .modal-footer { display: flex; gap: 12px; margin-top: 20px; }
        .modal-footer .btn { flex: 1; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 300;
            animation: fadeIn 0.3s;
            max-width: 360px;
            text-align: center;
        }
        .toast.error { background: var(--danger); }
        .toast.success { background: var(--success); }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } }

        /* 空状态 */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        .empty .icon { font-size: 48px; margin-bottom: 12px; }

        /* 分割线标题 */
        .section-title {
            font-size: 14px;
            color: var(--text-light);
            margin: 20px 0 12px;
            padding-left: 8px;
            border-left: 3px solid var(--primary);
        }

        /* 数字卡片 */
        .stat-card {
            text-align: center;
            padding: 16px;
            background: var(--white);
            border-radius: 12px;
        }
        .stat-card .num { font-size: 28px; color: var(--primary); font-weight: bold; }
        .stat-card .label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

        /* 登录页 */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            padding: 20px;
        }
        .login-card {
            background: var(--white);
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 320px;
        }
        .login-card h2 { text-align: center; font-size: 24px; color: var(--primary); margin-bottom: 4px; }
        .login-card .subtitle { text-align: center; color: var(--text-light); font-size: 13px; margin-bottom: 24px; }
        .login-card select, .login-card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }
        .login-card select:focus, .login-card input:focus { outline: none; border-color: var(--primary); }
        .login-card .hint { font-size: 12px; color: var(--text-light); text-align: center; margin-top: 16px; }
        .login-card .hint a { color: var(--primary); cursor: pointer; }

        /* 浮动添加按钮 */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 24px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255,107,53,0.4);
            z-index: 50;
            display: none;
        }
        .fab.show { display: block; }

        /* 成员选择网格 */
        .member-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .member-btn {
            padding: 16px 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--white);
        }
        .member-btn:hover { border-color: var(--primary-light); }
        .member-btn.selected { border-color: var(--primary); background: #fff3ee; }
        .member-btn .avatar { font-size: 32px; margin-bottom: 4px; }
        .member-btn .name { font-size: 14px; font-weight: 600; }
        .member-btn .role { font-size: 11px; color: var(--text-light); }

        /* 积分调整说明 */
        .adjust-tip {
            font-size: 11px;
            color: var(--text-light);
            background: #f9f9f9;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        /* 任务项操作按钮 */
        .task-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

        /* 积分调整快捷按钮组 */
        .adjust-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .adjust-child {
            background: var(--white);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .adjust-child .name { font-weight: 600; font-size: 15px; }
        .adjust-child .pts { color: var(--primary); font-weight: bold; font-size: 14px; }
        .adjust-btns { display: flex; gap: 4px; }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <h2>🎃 南瓜之家</h2>
            <p class="subtitle">家庭积分管理系统</p>

            <div id="memberSelectSection">
                <div class="member-grid" id="memberGrid"></div>
                <div id="pwdSection" style="display:none">
                    <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
                    <button class="btn btn-block" onclick="handleLogin()">进入</button>
                </div>
                <p class="hint">还没有账号？<a onclick="showSetup()" id="setupLink">初始化设置</a></p>
            </div>

            <div id="setupSection" style="display:none">
                <p class="subtitle" style="margin-bottom:16px">初始化家庭设置</p>
                <div class="member-grid" id="setupMemberGrid"></div>
                <div id="setupPwdSection" style="display:none">
                    <input type="password" id="setupPassword" placeholder="设置密码（至少6位）" autocomplete="new-password">
                    <input type="password" id="setupPassword2" placeholder="确认密码" autocomplete="new-password">
                    <button class="btn btn-block" onclick="handleSetup()">完成设置</button>
                </div>
                <p class="hint"><a onclick="showMemberSelect()">返回登录</a></p>
            </div>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="appPage" style="display:none">
        <div class="header">
            <div class="header-top">
                <h1>🎃 南瓜之家</h1>
                <span class="logout" onclick="doLogout()">退出</span>
            </div>
            <div style="font-size:12px;opacity:0.9;margin-top:4px" id="userInfo"></div>
        </div>

        <!-- 底部导航 -->
        <nav class="nav">
            <div class="nav-item active" onclick="switchPage('home')">
                <span class="icon">🏠</span><span>首页</span>
            </div>
            <div class="nav-item" onclick="switchPage('tasks')">
                <span class="icon">📋</span><span>任务</span>
            </div>
            <div class="nav-item" onclick="switchPage('shop')">
                <span class="icon">🎁</span><span>商城</span>
            </div>
            <div class="nav-item" onclick="switchPage('approve')" id="approveNav" style="display:none">
                <span class="icon">📮</span><span>审批</span>
                <span class="badge" id="approveBadge" style="display:none">0</span>
            </div>
            <div class="nav-item" onclick="switchPage('settings')">
                <span class="icon">⚙️</span><span>我的</span>
            </div>
        </nav>

        <!-- 首页 -->
        <div id="homePage" class="page active">
            <div id="homeContent"></div>
        </div>

        <!-- 任务页 -->
        <div id="tasksPage" class="page">
            <button class="fab" id="addTaskFab" style="display:none" onclick="showAddTask()">+</button>
            <div id="tasksContent"></div>
        </div>

        <!-- 商城页 -->
        <div id="shopPage" class="page">
            <button class="fab" id="addRewardFab" style="display:none" onclick="showAddReward()">+</button>
            <div id="shopContent"></div>
        </div>

        <!-- 审批页（家长） -->
        <div id="approvePage" class="page">
            <div id="approveContent"></div>
        </div>

        <!-- 我的页 -->
        <div id="settingsPage" class="page">
            <div id="settingsContent"></div>
        </div>
    </div>

    <!-- 添加任务模态框 -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="taskModalTitle">添加任务</span>
                <span class="close-btn" onclick="closeTaskModal()">✕</span>
            </div>
            <input type="hidden" id="editTaskId">
            <div class="form-group">
                <label>任务名称 *</label>
                <input type="text" id="taskName" placeholder="例如：整理房间、按时睡觉">
            </div>
            <div class="form-group">
                <label>描述（可选）</label>
                <textarea id="taskDesc" rows="2" placeholder="任务要求说明"></textarea>
            </div>
            <div class="form-group">
                <label>积分奖励 *</label>
                <input type="number" id="taskPoints" value="10" min="1" max="500">
            </div>
            <div class="form-group">
                <label>重复类型</label>
                <select id="taskRepeat">
                    <option value="once">一次性（做完不可重复）</option>
                    <option value="daily">每日（每天可做一次）</option>
                    <option value="weekly">每周（每周可做一次）</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeTaskModal()">取消</button>
                <button class="btn" onclick="saveTask()">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加奖励模态框 -->
    <div class="modal" id="rewardModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>添加奖励</span>
                <span class="close-btn" onclick="closeRewardModal()">✕</span>
            </div>
            <div class="form-group">
                <label>奖励名称 *</label>
                <input type="text" id="rewardName" placeholder="例如：游戏时间30分钟">
            </div>
            <div class="form-group">
                <label>描述说明（可选）</label>
                <textarea id="rewardDesc" rows="2" placeholder="奖励内容描述"></textarea>
            </div>
            <div class="form-group">
                <label>所需积分 *</label>
                <input type="number" id="rewardCost" value="50" min="1">
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeRewardModal()">取消</button>
                <button class="btn" onclick="saveReward()">保存</button>
            </div>
        </div>
    </div>

    <!-- 发布公告模态框 -->
    <div class="modal" id="announceModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="announceModalTitle">发布公告</span>
                <span class="close-btn" onclick="closeAnnounceModal()">✕</span>
            </div>
            <input type="hidden" id="editAnnounceId">
            <div class="form-group">
                <label>公告标题 *</label>
                <input type="text" id="announceTitle" placeholder="例如：本周任务调整、旅游计划">
            </div>
            <div class="form-group">
                <label>公告内容</label>
                <textarea id="announceContent" rows="5" placeholder="详细说明..."></textarea>
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:8px">
                <input type="checkbox" id="announcePinned" style="width:auto">
                <label style="margin:0;font-size:14px">置顶公告</label>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeAnnounceModal()">取消</button>
                <button class="btn" onclick="saveAnnouncement()">发布</button>
            </div>
        </div>
    </div>

    <!-- 积分调整模态框 -->
    <div class="modal" id="adjustModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="adjustModalTitle">调整积分</span>
                <span class="close-btn" onclick="closeAdjustModal()">✕</span>
            </div>
            <input type="hidden" id="adjustUserId">
            <div id="adjustChildName" style="font-weight:600;font-size:16px;margin-bottom:16px;text-align:center"></div>
            <div class="form-group">
                <label>调整积分 *</label>
                <input type="number" id="adjustAmount" value="10" min="1" max="500">
            </div>
            <div class="form-group">
                <label>原因说明 *</label>
                <input type="text" id="adjustNote" placeholder="例如：主动帮忙洗碗、积极写作业">
            </div>
            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
                <button class="btn btn-sm btn-success" onclick="setAdjustVal(10)">+10</button>
                <button class="btn btn-sm btn-success" onclick="setAdjustVal(20)">+20</button>
                <button class="btn btn-sm btn-success" onclick="setAdjustVal(50)">+50</button>
                <button class="btn btn-sm btn-success" onclick="setAdjustVal(100)">+100</button>
                <button class="btn btn-sm btn-danger" onclick="setAdjustVal(-10)">-10</button>
                <button class="btn btn-sm btn-danger" onclick="setAdjustVal(-20)">-20</button>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeAdjustModal()">取消</button>
                <button class="btn btn-success" onclick="confirmAdjust()">确认调整</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" style="display:none"></div>

    <script src="js/api.js"></script>
    <script>
        let currentPage = 'home';
        let isParent = false;
        let selectedMemberId = null;
        let selectedMemberName = '';
        let setupSelectedMember = null;
        let familyMembers = [];

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', async () => {
            if (Api.isLoggedIn()) {
                const fresh = await refreshUserInfo();
                if (fresh) showApp();
                else { Api.logout(); showLogin(); }
            } else {
                showLogin();
            }
        });

        function showLogin() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('appPage').style.display = 'none';
            selectedMemberId = null;
            setupSelectedMember = null;
            loadMemberList();
        }

        async function refreshUserInfo() {
            try {
                const data = await Api.auth.getProfile();
                Api.setAuth(Api.token, data.user);
                return true;
            } catch {
                return false;
            }
        }

        // ========== 成员选择登录 ==========
        async function loadMemberList() {
            const grid = document.getElementById('memberGrid');
            const setupGrid = document.getElementById('setupMemberGrid');

            // 预设家庭成员
            familyMembers = [
                { id: 'p_dad',     username: '爸爸',    role: 'parent', avatar: '👨' },
                { id: 'p_mom',     username: '妈妈',    role: 'parent', avatar: '👩' },
                { id: 'p_grandpa', username: '爷爷',    role: 'parent', avatar: '👴' },
                { id: 'p_grandma', username: '奶奶',    role: 'parent', avatar: '👵' },
                { id: 'c_pumpkin', username: '小南瓜',  role: 'child',  avatar: '🎃' },
                { id: 'c_chestnut', username: '小栗子', role: 'child', avatar: '🌰' },
            ];

            renderMemberGrid(grid, familyMembers, false);
            document.getElementById('memberSelectSection').style.display = 'block';
            document.getElementById('setupSection').style.display = 'none';
            renderMemberGrid(setupGrid, familyMembers, true);
        }

        function renderMemberGrid(container, members, isSetup) {
            container.innerHTML = members.map(m => `
                <div class="member-btn" data-id="${m.id}" data-role="${m.role}" data-name="${m.username}" data-avatar="${m.avatar}">
                    <div class="avatar">${m.avatar}</div>
                    <div class="name">${m.username}</div>
                    <div class="role">${m.role === 'parent' ? '家长' : '孩子'}</div>
                </div>
            `).join('');

            container.querySelectorAll('.member-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    container.querySelectorAll('.member-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    const id = btn.dataset.id;
                    const role = btn.dataset.role;
                    const name = btn.dataset.name;

                    if (isSetup) {
                        setupSelectedMember = { id, role, name, avatar: btn.dataset.avatar };
                        document.getElementById('setupPwdSection').style.display = 'block';
                        document.getElementById('setupPassword').focus();
                    } else {
                        selectedMemberId = id;
                        selectedMemberName = name;
                        document.getElementById('pwdSection').style.display = 'block';
                        document.getElementById('loginPassword').focus();
                    }
                });
            });
        }

        async function handleLogin() {
            const password = document.getElementById('loginPassword').value;
            if (!selectedMemberId || !password) { showToast('请选择成员并输入密码', 'error'); return; }
            try {
                const data = await Api.auth.loginByMember(selectedMemberId, password);
                showApp();
                showToast('欢迎，' + data.user.username + '！', 'success');
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function handleSetup() {
            const pw1 = document.getElementById('setupPassword').value;
            const pw2 = document.getElementById('setupPassword2').value;
            if (!setupSelectedMember || !pw1 || !pw2) { showToast('请选择成员并填写密码', 'error'); return; }
            if (pw1.length < 6) { showToast('密码至少6位', 'error'); return; }
            if (pw1 !== pw2) { showToast('两次密码不一致', 'error'); return; }
            try {
                const data = await Api.auth.setupFamily({
                    member_id: setupSelectedMember.id,
                    member_name: setupSelectedMember.name,
                    role: setupSelectedMember.role,
                    password: pw1
                });
                showApp();
                showToast('初始化成功！', 'success');
            } catch (e) { showToast(e.message, 'error'); }
        }

        function showSetup() {
            document.getElementById('memberSelectSection').style.display = 'none';
            document.getElementById('setupSection').style.display = 'block';
        }

        function showMemberSelect() {
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('memberSelectSection').style.display = 'block';
            setupSelectedMember = null;
        }

        // ========== 应用主视图 ==========

            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';
            isParent = Api.isParent();
            const user = Api.user;
            const roleText = { parent: '家长', child: '孩子' }[user.role] || '成员';
            document.getElementById('userInfo').textContent = user.username + ' · ' + roleText;

            currentPage = 'home';

        function doLogout() {
            Api.logout();
            location.reload();
        }

        // ========== 页面切换 ==========
        function switchPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

        // ========== 公告 ==========
        async function loadAnnouncementBar() {
            try {
                const data = await Api.announce.list();
                const announcements = data.announcements || [];
                const canEdit = data.can_edit;

                if (announcements.length === 0) {
                    if (canEdit) {
                        return '<div class="announcement-empty" onclick="openAddAnnounce()">📌 点击发布第一条公告</div>';
                    } else {
                        return '<div class="announcement-empty">📌 暂无公告</div>';
                    }
                }

                const top = announcements[0];
                let html = '';
                html += '<div class="announcement-bar' + (top.is_pinned ? ' pinned' : '') + '" onclick="openViewAnnounce(' + top.id + ')">';
                if (canEdit) {
                    html += '<span class="ann-edit" onclick="event.stopPropagation();openEditAnnounce(' + top.id + ')">编辑</span>';
                }
                html += '<div class="ann-title">' + (top.is_pinned ? '📌 ' : '') + top.title + '</div>';
                if (top.content) {
                    html += '<div class="ann-content">' + top.content + '</div>';
                }
                html += '<div class="ann-time">' + top.author_name + ' · ' + formatDate(top.created_at) + '</div>';
                html += '</div>';
                return html;
            } catch (e) { return ''; }
        }

            document.getElementById('announceTitle').value = '';

        async function saveAnnouncement() {
            const id = document.getElementById('editAnnounceId').value;
            const title = document.getElementById('announceTitle').value.trim();
            const content = document.getElementById('announceContent').value.trim();
            const isPinned = document.getElementById('announcePinned').checked;
            if (!title) { showToast('请输入公告标题', 'error'); return; }
            try {
                if (id) {
                    await Api.announce.update({ id, title, content, is_pinned: isPinned });

        // ========== 任务页 ==========
        async function loadTasksPage() {
            let html = '';
            try {
                const data = await Api.tasks.list();
                const tasks = data.tasks || [];

                if (tasks.length === 0) {
                    html = '<div class="empty"><div class="icon">📋</div><p>暂无任务</p>';
                    if (isParent) html += '<button class="btn btn-sm" onclick="showAddTask()">添加任务</button>';
                    html += '</div>';
                } else {
                    tasks.forEach(task => {
                        const canComplete = task.can_complete;
                        html += '<div class="card">';
                        html += '<div style="display:flex;justify-content:space-between;align-items:start">';
                        html += '<div style="flex:1"><div class="card-title">' + escapeHtml(task.title) + '</div>';
                        if (task.description) html += '<div class="card-meta">' + escapeHtml(task.description) + '</div>';
                        html += '<div class="card-meta">' + getRepeatText(task.repeat_type) + '</div></div>';
                        html += '<span class="tag">+' + task.points + '</span></div>';
                        html += '<div class="task-actions">';

                        if (isParent) {
                            html += '<button class="btn btn-sm btn-outline" onclick="doEditTask(' + task.id + ')">编辑</button>';
                            html += '<button class="btn btn-sm btn-danger" onclick="doDeleteTask(' + task.id + ')">删除</button>';
                        } else {
                            if (canComplete) {
                                html += '<button class="btn btn-sm btn-success" onclick="doCompleteTask(' + task.id + ')">完成任务</button>';
                            } else {
                                html += '<button class="btn btn-sm btn-outline" disabled>已完成</button>';
                            }
                        }
                        html += '</div></div>';
                    });
                }
            } catch (e) {
                html = '<div class="card"><p style="color:var(--danger)">加载失败：' + e.message + '</p></div>';
            }

            document.getElementById('tasksContent').innerHTML = html;

        function showAddTask() {
            document.getElementById('taskModalTitle').textContent = '添加任务';
            document.getElementById('editTaskId').value = '';
            document.getElementById('taskName').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('taskPoints').value = '10';
            document.getElementById('taskRepeat').value = 'once';
            document.getElementById('taskModal').classList.add('show');
            document.getElementById('taskName').focus();
        }

        async function doEditTask(id) {
            try {
                const data = await Api.tasks.list();
                const task = (data.tasks || []).find(t => String(t.id) === String(id));
                if (!task) { showToast('任务不存在', 'error'); return; }
                document.getElementById('taskModalTitle').textContent = '编辑任务';
                document.getElementById('editTaskId').value = id;
                document.getElementById('taskName').value = task.title;
                document.getElementById('taskDesc').value = task.description || '';
                document.getElementById('taskPoints').value = task.points;
                document.getElementById('taskRepeat').value = task.repeat_type;
                document.getElementById('taskModal').classList.add('show');
            } catch (e) { showToast('加载失败', 'error'); }
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('show');
        }

        async function saveTask() {
            const id = document.getElementById('editTaskId').value;
            const title = document.getElementById('taskName').value.trim();
            const description = document.getElementById('taskDesc').value.trim();
            const points = parseInt(document.getElementById('taskPoints').value) || 10;
            const repeatType = document.getElementById('taskRepeat').value;

            if (!title) { showToast('请输入任务名称', 'error'); return; }
            if (points < 1 || points > 500) { showToast('积分需在1-500之间', 'error'); return; }

            try {
                const payload = { title, description, points, repeat_type: repeatType };
                if (id) {
                    payload.id = parseInt(id);
                    await Api.tasks.update(payload);
                    showToast('任务已更新', 'success');
                } else {
                    await Api.tasks.create(payload);
                    showToast('任务已创建', 'success');
                }
                closeTaskModal();
                await loadTasksPage();
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function doCompleteTask(id) {
            try {
                const result = await Api.tasks.complete(id);
                showToast('获得 ' + result.points_earned + ' 积分！', 'success');
                await loadTasksPage();
                await loadHomePage();
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function doDeleteTask(id) {
            if (!confirm('确定删除该任务？')) return;
            try {
                await Api.tasks.delete(id);
                showToast('已删除', 'success');
                await loadTasksPage();
            } catch (e) { showToast(e.message, 'error'); }
        }

                html += '<div class="card">';
                html += '<div class="form-group"><label>添加证件</label>';
                html += '<input type="text" id="docName" placeholder="证件名称（如：身份证、护照）">';
                html += '<input type="text" id="docInfo" placeholder="证件号码" style="margin-top:8px">';
                html += '<button class="btn btn-sm" style="margin-top:8px" onclick="doAddDocument()">添加</button></div></div>';
                html += '<div id="documentList"></div>';

                loadFamilyInfo();
            } else {
                // 孩子：积分历史
                html += '<div class="section-title">💰 积分明细</div>';
                html += '<div class="card">';
                try {
                    const data = await Api.points.history();
                    const history = data.history || [];
                    if (history.length === 0) {
                        html += '<p style="text-align:center;color:var(--text-light)">暂无积分记录</p>';
                    } else {
                        history.forEach(h => {
                            const sign = h.amount > 0 ? '+' : '';
                            const color = h.amount > 0 ? 'var(--success)' : 'var(--danger)';
                            html += '<div class="list-item" style="padding:10px 0">';
                            html += '<div><div>' + escapeHtml(h.note || getTypeText(h.type)) + '</div>';
                            html += '<div style="font-size:12px;color:var(--text-light)">' + formatDate(h.created_at) + '</div></div>';
                            html += '<div style="color:' + color + ';font-weight:600">' + sign + h.amount + '</div>';
                            html += '</div>';
                        });
                    }
                } catch (e) { html += '<p>加载失败</p>'; }
                html += '</div>';

                // 家庭公告
                html += '<div class="section-title">📢 家庭公告</div>';
                try {
                    const adata = await Api.announce.list();
                    const anns = adata.announcements || [];
                    if (anns.length === 0) {
                        html += '<div class="card"><p style="text-align:center;color:var(--text-light)">暂无公告</p></div>';
                    } else {
                        anns.forEach(a => {
                            html += '<div class="card">';
                            html += '<div style="font-weight:600;margin-bottom:6px">' + (a.is_pinned ? '📌 ' : '') + escapeHtml(a.title) + '</div>';
                            if (a.content) html += '<div style="font-size:14px;color:var(--text-light);margin-bottom:6px">' + escapeHtml(a.content) + '</div>';
                            html += '<div style="font-size:12px;color:var(--text-light)">' + a.author_name + ' · ' + formatDate(a.created_at) + '</div>';
                            html += '</div>';
                        });
                    }
                } catch (e) {}
            }

            document.getElementById('settingsContent').innerHTML = html;
        }

        // ========== 家庭资料 ==========
        async function loadFamilyInfo() {
            try {
                const data = await Api.family.list();
                const info = data.info || [];

                const birthdays = info.filter(i => i.category === 'birthday');
                let bHtml = '';
                if (birthdays.length === 0) bHtml = '<div class="card"><p style="text-align:center;color:var(--text-light)">暂无生日记录</p></div>';
                birthdays.forEach(b => {
                    const days = b.days_until !== undefined ? b.days_until : '?';
                    bHtml += '<div class="card"><div class="list-item" style="padding:0;border:none">';
                    bHtml += '<div><div style="font-weight:600">🎂 ' + escapeHtml(b.title) + '</div>';
                    bHtml += '<div style="font-size:13px;color:var(--text-light)">' + b.content + '（' + days + '天后）</div></div>';
                    bHtml += '<button class="btn btn-sm btn-danger" onclick="doDeleteFamilyInfo(' + b.id + ')">删除</button>';
                    bHtml += '</div></div>';
                });
                const bList = document.getElementById('birthdayList');
                if (bList) bList.innerHTML = bHtml;

                const docs = info.filter(i => i.category === 'document');
                let dHtml = '';
                if (docs.length === 0) dHtml = '<div class="card"><p style="text-align:center;color:var(--text-light)">暂无证件记录</p></div>';
                docs.forEach(d => {
                    dHtml += '<div class="card"><div class="list-item" style="padding:0;border:none">';
                    dHtml += '<div><div style="font-weight:600">📄 ' + escapeHtml(d.title) + '</div>';
                    dHtml += '<div style="font-size:13px;color:var(--text-light)">' + escapeHtml(d.content) + '</div></div>';
                    dHtml += '<button class="btn btn-sm btn-danger" onclick="doDeleteFamilyInfo(' + d.id + ')">删除</button>';
                    dHtml += '</div></div>';
                });
                const dList = document.getElementById('documentList');
                if (dList) dList.innerHTML = dHtml;
            } catch (e) { console.error(e); }
        }

        // ========== 积分调整 ==========
        function openAdjustModal(userId, userName, presetVal) {
            document.getElementById('adjustUserId').value = userId;
            document.getElementById('adjustChildName').textContent = userName;
            document.getElementById('adjustAmount').value = Math.abs(presetVal);
            document.getElementById('adjustNote').value = '';
            if (presetVal < 0) {
                document.getElementById('adjustAmount').value = Math.abs(presetVal);
            }
            document.getElementById('adjustModal').classList.add('show');
        }

        function setAdjustVal(val) {
            document.getElementById('adjustAmount').value = val < 0 ? -Math.abs(val) : Math.abs(val);
            document.getElementById('adjustAmount').value = Math.abs(val);
            if (val < 0) {
                document.getElementById('adjustAmount').value = -Math.abs(val);
            }
        }

        function closeAdjustModal() {
            document.getElementById('adjustModal').classList.remove('show');
        }

        async function confirmAdjust() {
            const userId = parseInt(document.getElementById('adjustUserId').value);
            const amount = parseInt(document.getElementById('adjustAmount').value);
            const note = document.getElementById('adjustNote').value.trim();

            if (!userId || !amount) { showToast('参数错误', 'error'); return; }
            if (!note) { showToast('请填写调整原因', 'error'); return; }

            const type = amount > 0 ? 'bonus' : 'deduct';
            try {
                await Api.points.adjust(userId, Math.abs(amount), type, note);
                showToast((amount > 0 ? '+' : '') + amount + '积分（' + note + '）', 'success');
                closeAdjustModal();
                await loadHomePage();
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ========== 家庭资料操作 ==========
        async function doAddBirthday() {
            const name = document.getElementById('birthdayName').value.trim();
            const date = document.getElementById('birthdayDate').value;
            if (!name || !date) { showToast('请填写名称和日期', 'error'); return; }
            try {
                await Api.family.create({ category: 'birthday', title: name, content: date });
                showToast('生日已添加', 'success');
                document.getElementById('birthdayName').value = '';
                document.getElementById('birthdayDate').value = '';
                await loadFamilyInfo();
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function doAddDocument() {
            const name = document.getElementById('docName').value.trim();
            const info = document.getElementById('docInfo').value.trim();
            if (!name || !info) { showToast('请填写证件名称和信息', 'error'); return; }
            try {
                await Api.family.create({ category: 'document', title: name, content: info });
                showToast('证件已添加', 'success');
                document.getElementById('docName').value = '';
                document.getElementById('docInfo').value = '';
                await loadFamilyInfo();
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function doDeleteFamilyInfo(id) {
            if (!confirm('确定删除？')) return;
            try {
                await Api.family.delete(id);
                showToast('已删除', 'success');
                await loadFamilyInfo();
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ========== 工具函数 ==========
        function showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            toast.className = 'toast' + (type ? ' ' + type : '');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getRepeatText(type) {
            return { once: '一次性', daily: '每日', weekly: '每周' }[type] || type;
        }

        function getTypeText(type) {
            return { earn: '完成任务', redeem: '兑换奖励', bonus: '奖励加分', deduct: '扣分' }[type] || type;
        }

        function formatDate(str) {
            if (!str) return '';
            const d = new Date(str);
            return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        }
    </script>
</body>
</html>
