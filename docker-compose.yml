services:
  app:
    build: .
    container_name: family-points
    ports:
      - "8081:80"
    volumes:
      - ./web:/var/www/html
      - ./api:/var/www/html/api
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=family_points
      - DB_USER=familyuser
      - DB_PASS=family_pass_2024
    networks:
      - family-network

  db:
    image: mysql:8.0
    container_name: family-points-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 19630901Ab
      MYSQL_DATABASE: family_points
      MYSQL_USER: familyuser
      MYSQL_PASSWORD: family_pass_2024
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - family-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  family-network:
    driver: bridge

volumes:
  mysql_data:
